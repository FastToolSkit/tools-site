<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Rotate PDF - FastTools</title>

<meta name="description" content="Rotate PDF pages online instantly and download the corrected document.">

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";
</script>

<style>

.drop-area{
border:2px dashed #cbd5e1;
padding:40px;
border-radius:10px;
background:#f8fafc;
margin-top:20px;
cursor:pointer;
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:20px;
margin-top:25px;
}

.preview-item{
background:#f8fafc;
border:1px solid #cbd5e1;
padding:10px;
border-radius:8px;
text-align:center;
}

.preview-item canvas{
width:100%;
border-radius:6px;
}

.rotate-controls{
margin-top:25px;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Rotate PDF</h1>

<p>Upload a PDF, preview pages, choose rotation angle, then download.</p>

<div class="drop-area" id="drop-area">

<p>Drag PDF here or click to upload</p>

<input type="file" id="file-input" accept=".pdf" hidden>

</div>

<div id="preview" class="preview-grid"></div>

<div class="rotate-controls">

<label>Rotation Angle</label>

<select id="angle">

<option value="90">Rotate 90°</option>
<option value="180">Rotate 180°</option>
<option value="270">Rotate 270°</option>

</select>

</div>

<button class="main-button" id="rotateBtn">
Rotate & Download
</button>

<div id="loader" style="display:none;margin-top:20px">

<p>Processing PDF...</p>

<div class="spinner"></div>

</div>

</div>


<div class="more-tools">

<h3>More Tools</h3>

<a href="split-pdf.html">Split PDF</a>
<a href="merge-pdf.html">Merge PDF</a>
<a href="pdf-to-jpg.html">PDF to JPG</a>
<a href="jpg-to-pdf.html">JPG to PDF</a>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<script>

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");
const rotateBtn = document.getElementById("rotateBtn");
const loader = document.getElementById("loader");

let pdfFile = null;

dropArea.onclick = () => fileInput.click();

dropArea.addEventListener("dragover", e=>{
e.preventDefault();
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", ()=>{
handleFile(fileInput.files[0]);
});


async function handleFile(file){

if(!file) return;

pdfFile = file;

preview.innerHTML="";

const buffer = await file.arrayBuffer();

const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);

const viewport = page.getViewport({scale:0.5});

const canvas = document.createElement("canvas");

const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

const box = document.createElement("div");

box.className="preview-item";

box.appendChild(canvas);

const label = document.createElement("div");
label.innerText="Page "+i;

box.appendChild(label);

preview.appendChild(box);

}

}


rotateBtn.addEventListener("click", rotatePDF);


async function rotatePDF(){

if(!pdfFile){
alert("Upload a PDF first");
return;
}

loader.style.display="block";

const bytes = await pdfFile.arrayBuffer();

const pdfDoc = await PDFLib.PDFDocument.load(bytes);

const pages = pdfDoc.getPages();

const angle = parseInt(document.getElementById("angle").value);

pages.forEach(page=>{
page.setRotation(PDFLib.degrees(angle));
});

const newBytes = await pdfDoc.save();

const blob = new Blob([newBytes],{type:"application/pdf"});

const url = URL.createObjectURL(blob);

const link = document.createElement("a");

link.href = url;
link.download = "rotated.pdf";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

loader.style.display="none";

}

</script>

</body>
</html>
