<!DOCTYPE html>
<html>
<head>

<title>JPG to PNG Converter - FastTools</title>

<meta name="description" content="Convert JPG images to PNG online for free using FastTools.">

</head>

<body>

<h1>JPG to PNG Converter</h1>

<p>Upload JPG images and convert them to PNG instantly.</p>

<input type="file" id="upload" multiple>

<br><br>

<button onclick="convert()">Convert to PNG</button>

<br><br>

<div id="downloads"></div>

<script>

function convert(){

let files = document.getElementById("upload").files;

let downloads = document.getElementById("downloads");
downloads.innerHTML = "";

for(let i=0;i<files.length;i++){

let file = files[i];

let img = new Image();
let reader = new FileReader();

reader.onload = function(e){

img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");

canvas.width = img.width;
canvas.height = img.height;

let ctx = canvas.getContext("2d");
ctx.drawImage(img,0,0);

let png = canvas.toDataURL("image/png");

let link = document.createElement("a");

link.href = png;
link.download = "converted_"+(i+1)+".png";
link.innerHTML = "Download Image "+(i+1);

downloads.appendChild(link);
downloads.appendChild(document.createElement("br"));

}

}

reader.readAsDataURL(file);

}

}

</script>

</body>
</html>
