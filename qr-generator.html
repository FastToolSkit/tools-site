<!DOCTYPE html>
<html>

<head>

<title>QR Code Generator - FastTools</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

</head>

<body>

<header class="site-header">
<a href="index.html" class="logo">FastTools</a>
</header>

<a href="index.html" class="back-home">← Back to FastTools</a>


<div class="tool-container">

<h1>QR Code Generator</h1>

<input id="text" type="text" placeholder="Enter text or URL">

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

</div>


<footer class="site-footer">
<p>© 2026 FastTools • Free Online Tools</p>
</footer>


<script>

function generateQR(){

document.getElementById("qrcode").innerHTML="";

var text = document.getElementById("text").value;

new QRCode(document.getElementById("qrcode"),{
text:text,
width:200,
height:200
});

}

</script>


</body>

</html>
