<div class="tool-container">

<h1>Word & Character Counter</h1>

<textarea id="text" placeholder="Paste or type your text here..."></textarea>

<div class="button-group">

<button onclick="countWords()">Count Words & Characters</button>

<button onclick="resetCounter()" class="reset-btn">
Reset
</button>

</div>

<h3 id="result">Words: 0 | Characters: 0</h3>

</div>


<footer class="site-footer">
<p>

</p>

<script>

function countWords(){

let text = document.getElementById("text").value;

let characters = text.length;

let words = text.trim().split(/\s+/).filter(Boolean).length;

document.getElementById("result").innerHTML =
"Words: " + words + " | Characters: " + characters;

}

function resetCounter(){

document.getElementById("text").value = "";

document.getElementById("result").innerHTML = "Words: 0 | Characters: 0";

document.getElementById("text").focus();

}

</script>

</body>
