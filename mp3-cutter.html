<script src="https://unpkg.com/wavesurfer.js"></script>
<script src="https://unpkg.com/wavesurfer.js/dist/plugins/regions.min.js"></script>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">

<div class="tool-container">

<h1>MP3 Cutter</h1>

<p>Upload an MP3 file and trim it visually.</p>

<input type="file" id="audioFile" accept="audio/*">

<div id="waveform" style="margin-top:30px;"></div>

<div style="margin-top:20px">

<button class="main-button" onclick="playAudio()">Play / Pause</button>

<button class="main-button" onclick="cutAudio()">Trim Audio</button>

</div>

<br>

<a id="downloadLink"></a>

</div>

<footer class="site-footer">

<p>
© FastTools |
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a> |
<a href="contact.html">Contact</a>
</p>

</footer>

<script>

let wavesurfer;
let region;

document.getElementById("audioFile").addEventListener("change", function(event){

const file = event.target.files[0];

const url = URL.createObjectURL(file);

if(!wavesurfer){

wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#94a3b8",
progressColor:"#2563eb",
height:120,
plugins:[
WaveSurfer.regions.create({})
]
});

}

wavesurfer.load(url);

wavesurfer.on("ready",function(){

region = wavesurfer.addRegion({
start:0,
end:wavesurfer.getDuration()/2,
color:"rgba(37,99,235,0.3)",
drag:true,
resize:true
});

});

});

function playAudio(){
wavesurfer.playPause();
}

function cutAudio(){

const start = region.start;
const end = region.end;

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

fetch(wavesurfer.backend.buffer)
.then(r=>r.arrayBuffer())
.then(buffer=>audioContext.decodeAudioData(buffer))
.then(audioBuffer=>{

const sampleRate = audioBuffer.sampleRate;

const startOffset = start * sampleRate;
const endOffset = end * sampleRate;

const frameCount = endOffset - startOffset;

const newBuffer = audioContext.createBuffer(
audioBuffer.numberOfChannels,
frameCount,
sampleRate
);

for(let channel=0; channel<audioBuffer.numberOfChannels; channel++){

const oldData = audioBuffer.getChannelData(channel);
const newData = newBuffer.getChannelData(channel);

for(let i=0;i<frameCount;i++){
newData[i] = oldData[i+startOffset];
}

}

const blob = bufferToWave(newBuffer);

const url = URL.createObjectURL(blob);

const download = document.getElementById("downloadLink");

download.href = url;
download.download = "trimmed-audio.wav";
download.innerText = "Download Trimmed Audio";

});

}

function bufferToWave(buffer){

const numOfChan = buffer.numberOfChannels;
const length = buffer.length * numOfChan * 2 + 44;
const arrayBuffer = new ArrayBuffer(length);
const view = new DataView(arrayBuffer);

let offset = 0;

function writeString(str){
for(let i=0;i<str.length;i++){
view.setUint8(offset++,str.charCodeAt(i));
}
}

writeString("RIFF");
view.setUint32(offset,36 + buffer.length * 2,true); offset+=4;
writeString("WAVE");
writeString("fmt ");
view.setUint32(offset,16,true); offset+=4;
view.setUint16(offset,1,true); offset+=2;
view.setUint16(offset,numOfChan,true); offset+=2;
view.setUint32(offset,buffer.sampleRate,true); offset+=4;
view.setUint32(offset,buffer.sampleRate * 2,true); offset+=4;
view.setUint16(offset,numOfChan * 2,true); offset+=2;
view.setUint16(offset,16,true); offset+=2;
writeString("data");
view.setUint32(offset,buffer.length * 2,true); offset+=4;

for(let i=0;i<buffer.length;i++){
for(let channel=0;channel<numOfChan;channel++){
let sample = buffer.getChannelData(channel)[i];
sample = Math.max(-1,Math.min(1,sample));
view.setInt16(offset,sample<0?sample*0x8000:sample*0x7FFF,true);
offset+=2;
}
}

return new Blob([view],{type:"audio/wav"});

}

</script>

</body>
</html>
