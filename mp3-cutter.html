<h1>MP3 Cutter</h1>

<p>Upload an MP3 file and trim it instantly.</p>

<input type="file" id="audioFile" accept="audio/mp3">

<br>

<audio id="audioPlayer" controls style="margin-top:20px;"></audio>

<br><br>

<label>Start Time (seconds)</label>
<input type="number" id="startTime" value="0">

<label>End Time (seconds)</label>
<input type="number" id="endTime">

<button class="main-button" onclick="cutAudio()">Cut MP3</button>

<br>

<a id="downloadLink"></a>

</div>

<script>

let audioBuffer;

document.getElementById("audioFile").addEventListener("change", async function(event){

const file = event.target.files[0];

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const arrayBuffer = await file.arrayBuffer();

audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

const audioURL = URL.createObjectURL(file);

document.getElementById("audioPlayer").src = audioURL;

document.getElementById("endTime").value = Math.floor(audioBuffer.duration);

});

async function cutAudio(){

const start = parseFloat(document.getElementById("startTime").value);
const end = parseFloat(document.getElementById("endTime").value);

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const sampleRate = audioBuffer.sampleRate;

const startOffset = start * sampleRate;
const endOffset = end * sampleRate;

const frameCount = endOffset - startOffset;

const newBuffer = audioContext.createBuffer(
audioBuffer.numberOfChannels,
frameCount,
sampleRate
);

for(let channel=0; channel<audioBuffer.numberOfChannels; channel++){

const oldData = audioBuffer.getChannelData(channel);
const newData = newBuffer.getChannelData(channel);

for(let i=0; i<frameCount; i++){
newData[i] = oldData[i + startOffset];
}

}

const wavBlob = bufferToWave(newBuffer);

const url = URL.createObjectURL(wavBlob);

const downloadLink = document.getElementById("downloadLink");

downloadLink.href = url;
downloadLink.download = "trimmed-audio.wav";
downloadLink.innerText = "Download Trimmed Audio";

}

function bufferToWave(buffer){

const numOfChan = buffer.numberOfChannels;
const length = buffer.length * numOfChan * 2 + 44;
const bufferArray = new ArrayBuffer(length);
const view = new DataView(bufferArray);

let offset = 0;

function writeString(str){
for(let i=0;i<str.length;i++){
view.setUint8(offset++, str.charCodeAt(i));
}
}

writeString("RIFF");
view.setUint32(offset, 36 + buffer.length * 2, true); offset+=4;
writeString("WAVE");
writeString("fmt ");
view.setUint32(offset, 16, true); offset+=4;
view.setUint16(offset, 1, true); offset+=2;
view.setUint16(offset, numOfChan, true); offset+=2;
view.setUint32(offset, buffer.sampleRate, true); offset+=4;
view.setUint32(offset, buffer.sampleRate * 2, true); offset+=4;
view.setUint16(offset, numOfChan * 2, true); offset+=2;
view.setUint16(offset, 16, true); offset+=2;
writeString("data");
view.setUint32(offset, buffer.length * 2, true); offset+=4;

for(let i=0;i<buffer.length;i++){
for(let channel=0; channel<numOfChan; channel++){
let sample = buffer.getChannelData(channel)[i];
sample = Math.max(-1, Math.min(1, sample));
view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
offset+=2;
}
}

return new Blob([view], { type:"audio/wav" });

}

</script>
