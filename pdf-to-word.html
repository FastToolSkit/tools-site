<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>PDF to Word Converter - FastTools</title>

<meta name="description" content="Convert PDF to Word online for free using FastTools.">

<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>

#drop-area{
border:2px dashed #2c3e50;
padding:40px;
margin:auto;
width:60%;
background:white;
cursor:pointer;
}

#preview{
margin-top:20px;
}

#preview div{
margin:10px;
padding:10px;
border:1px solid #ddd;
}

#progress{
width:60%;
margin:auto;
background:#eee;
height:20px;
margin-top:20px;
}

#progress-bar{
height:100%;
width:0%;
background:#2c3e50;
}

.download-btn{
display:inline-block;
margin-top:15px;
padding:12px 18px;
background:#2c3e50;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>


<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>PDF to Word Converter</h1>

<p>Upload PDF files and convert them to Word (.docx)</p>

<div id="drop-area">
<p>Drag & Drop PDF files here or Click to Upload</p>
<input type="file" id="upload" multiple accept=".pdf" hidden>
</div>

<div id="preview"></div>

<div id="progress">
<div id="progress-bar"></div>
</div>

<br>

<button onclick="convertPDF()">Convert to Word</button>

<p id="status"></p>

<div id="downloads"></div>

</div>


<footer class="site-footer">

<p>
© 2026 FastTools • Free Online Tools
</p>

<div class="footer-links">
<a href="privacy.html">Privacy</a>
<span>•</span>
<a href="terms.html">Terms</a>
<span>•</span>
<a href="contact.html">Contact</a>
</div>

</footer>


<script>

const API_KEY="YOUR_API_KEY";

let files=[];

const dropArea=document.getElementById("drop-area");
const fileInput=document.getElementById("upload");
const preview=document.getElementById("preview");

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{
e.preventDefault();
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
files=[...e.dataTransfer.files];
showPreview();
});

fileInput.addEventListener("change",()=>{
files=[...fileInput.files];
showPreview();
});

function showPreview(){

preview.innerHTML="";

files.forEach(file=>{

let div=document.createElement("div");

div.innerHTML=`
📄 ${file.name}
<br>
Size: ${(file.size/1024/1024).toFixed(2)} MB
`;

preview.appendChild(div);

});

}

async function convertPDF(){

if(files.length===0){
alert("Upload a PDF first");
return;
}

document.getElementById("downloads").innerHTML="";
document.getElementById("status").innerText="Creating conversion job...";

updateProgress(5);

await convertSingle(files[0]);

}

async function convertSingle(file){

try{

const jobResponse = await fetch("https://api.cloudconvert.com/v2/jobs",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
tasks:{
upload:{operation:"import/upload"},
convert:{
operation:"convert",
input:"upload",
input_format:"pdf",
output_format:"docx"
},
export:{operation:"export/url",input:"convert"}
}
})
});

const jobData = await jobResponse.json();

const uploadTask = jobData.data.tasks.find(t=>t.name==="upload");

document.getElementById("status").innerText="Uploading PDF...";

updateProgress(20);

const form = new FormData();

Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>{
form.append(k,v);
});

form.append("file",file);

await fetch(uploadTask.result.form.url,{
method:"POST",
body:form
});

document.getElementById("status").innerText="Converting PDF...";

updateProgress(40);

const jobId = jobData.data.id;

let downloadUrl=null;

for(let i=0;i<15;i++){

await new Promise(r=>setTimeout(r,1500));

const check = await fetch(
"https://api.cloudconvert.com/v2/jobs/"+jobId,{
headers:{
"Authorization":"Bearer "+API_KEY
}
});

const data = await check.json();

const exportTask = data.data.tasks.find(
t=>t.operation==="export/url"
);

if(exportTask && exportTask.result && exportTask.result.files){

downloadUrl = exportTask.result.files[0].url;

break;

}

}

if(!downloadUrl){

document.getElementById("status").innerText=
"Conversion failed or API limit reached.";

return;

}

updateProgress(90);

document.getElementById("status").innerText="Preparing download...";

showDownload(downloadUrl,file.name);

updateProgress(100);

document.getElementById("status").innerText="Finished!";

}catch(err){

console.error(err);

document.getElementById("status").innerText="Unexpected error occurred.";

}

}

function showDownload(url,name){

const downloads=document.getElementById("downloads");

downloads.innerHTML=`
<a href="${url}" class="download-btn" download="${name.replace(".pdf",".docx")}">
Download ${name.replace(".pdf",".docx")}
</a>
`;

}

function updateProgress(percent){

document.getElementById("progress-bar").style.width=percent+"%";

}

</script>

</body>
</html>
