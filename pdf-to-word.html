async function convertPDF(){

const file = document.getElementById("fileInput").files[0];

if(!file){
alert("Please upload a PDF");
return;
}

document.getElementById("status").innerText="Uploading...";

const response = await fetch("https://api.cloudconvert.com/v2/jobs",{
method:"POST",
headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
tasks:{
upload:{
operation:"import/upload"
},
convert:{
operation:"convert",
input:"upload",
input_format:"pdf",
output_format:"docx"
},
export:{
operation:"export/url",
input:"convert"
}
}
})
});

const data = await response.json();

const uploadTask = data.data.tasks.find(t => t.name==="upload");

const form = new FormData();

Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>{
form.append(k,v);
});

form.append("file",file);

await fetch(uploadTask.result.form.url,{
method:"POST",
body:form
});

document.getElementById("status").innerText="Converting...";

const jobId = data.data.id;

setTimeout(()=>checkStatus(jobId),3000);

}

async function checkStatus(jobId){

const response = await fetch("https://api.cloudconvert.com/v2/jobs/"+jobId,{
headers:{
"Authorization":"Bearer "+API_KEY
}
});

const data = await response.json();

const exportTask = data.data.tasks.find(t=>t.operation==="export/url");

if(exportTask && exportTask.result){

const file = exportTask.result.files[0];

document.getElementById("status").innerText="Done!";

document.getElementById("download").innerHTML=
`<a href="${file.url}" target="_blank">Download Word File</a>`;

}else{

setTimeout(()=>checkStatus(jobId),2000);

}

}
