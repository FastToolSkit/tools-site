<!DOCTYPE html>
<html>

<head>

<title>PDF to Word Converter - FastTools</title>

<meta name="description" content="Convert PDF to Word online for free. FastTools allows you to upload multiple PDFs and convert them to DOCX instantly.">

<link rel="stylesheet" href="style.css">

<style>

#drop-area{
border:2px dashed #2c3e50;
padding:40px;
margin:auto;
width:60%;
background:white;
cursor:pointer;
}

#preview{
margin-top:20px;
}

#preview div{
margin:10px;
padding:10px;
border:1px solid #ddd;
}

#progress{
width:60%;
margin:auto;
background:#eee;
height:20px;
margin-top:20px;
}

#progress-bar{
height:100%;
width:0%;
background:#2c3e50;
}

</style>

</head>

<body>

<header class="site-header">
<a href="index.html" class="logo">FastTools</a>
</header>

<a href="index.html" class="back-home">← Back to FastTools</a>

<div class="tool-container">

<h1>PDF to Word Converter</h1>

<p>Upload PDF files and convert them to Word (.docx)</p>

<div id="drop-area">
<p>Drag & Drop PDF files here or Click to Upload</p>
<input type="file" id="upload" multiple accept=".pdf" hidden>
</div>

<div id="preview"></div>

<div id="progress">
<div id="progress-bar"></div>
</div>

<br>

<button onclick="convertPDF()">Convert to Word</button>

<p id="status"></p>

<div id="downloads"></div>

</div>

<footer class="site-footer">
<p>© 2026 FastTools • Free Online Tools</p>
</footer>

<script>

const API_KEY="YOUR_API_KEY_HERE";

let files=[];

const dropArea=document.getElementById("drop-area");
const fileInput=document.getElementById("upload");
const preview=document.getElementById("preview");

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{
e.preventDefault();
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
files=[...e.dataTransfer.files];
showPreview();
});

fileInput.addEventListener("change",()=>{
files=[...fileInput.files];
showPreview();
});

function showPreview(){

preview.innerHTML="";

files.forEach(file=>{

if(file.size>20*1024*1024){
alert("File too large (max 20MB)");
return;
}

let div=document.createElement("div");

div.innerHTML=`
📄 ${file.name}
<br>
Size: ${(file.size/1024/1024).toFixed(2)} MB
`;

preview.appendChild(div);

});

}

async function convertPDF(){

if(files.length===0){
alert("Upload at least one PDF");
return;
}

document.getElementById("status").innerText="Starting conversion...";

for(let i=0;i<files.length;i++){

updateProgress((i/files.length)*100);

await convertSingle(files[i],i);

}

updateProgress(100);

document.getElementById("status").innerText="Finished!";

}

async function convertSingle(file,index){

try{

document.getElementById("status").innerText="Uploading PDF...";

const job=await fetch("https://api.cloudconvert.com/v2/jobs",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
tasks:{
upload:{operation:"import/upload"},
convert:{
operation:"convert",
input:"upload",
input_format:"pdf",
output_format:"docx"
},
export:{
operation:"export/url",
input:"convert"
}
}
})
});

if(job.status===402 || job.status===403){

document.getElementById("status").innerText=
"Daily conversion limit reached. Please try again tomorrow.";

return;
}

const jobData=await job.json();

if(!jobData.data){
document.getElementById("status").innerText="Conversion failed.";
return;
}

const uploadTask=jobData.data.tasks.find(t=>t.name==="upload");

const form=new FormData();

Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>{
form.append(k,v);
});

form.append("file",file);

await fetch(uploadTask.result.form.url,{
method:"POST",
body:form
});

const jobId=jobData.data.id;

document.getElementById("status").innerText="Converting PDF...";

let downloadUrl=null;

let attempts=0;
let maxAttempts=20;

while(!downloadUrl && attempts<maxAttempts){

await new Promise(r=>setTimeout(r,2000));

const check=await fetch(
"https://api.cloudconvert.com/v2/jobs/"+jobId,{
headers:{
"Authorization":"Bearer "+API_KEY
}
});

const data=await check.json();

if(data.data){

const exportTask=data.data.tasks.find(
t=>t.operation==="export/url"
);

if(exportTask && exportTask.result){

document.getElementById("status").innerText="Preparing download...";

downloadUrl=exportTask.result.files[0].url;

}

}

attempts++;

}

if(!downloadUrl){

document.getElementById("status").innerText=
"Conversion failed or API limit reached.";

return;

}

addDownload(downloadUrl,file.name,index);

}catch(err){

console.error(err);

document.getElementById("status").innerText=
"Unexpected error occurred.";

}

}

function addDownload(url,name,i){

const downloads=document.getElementById("downloads");

const link=document.createElement("a");

link.href=url;
link.download=name.replace(".pdf",".docx");

link.innerText="Download "+name.replace(".pdf",".docx");

downloads.appendChild(link);
downloads.appendChild(document.createElement("br"));

}

function updateProgress(percent){

document.getElementById("progress-bar").style.width=percent+"%";

}

</script>

</body>
</html>
