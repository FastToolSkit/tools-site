<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>JPG to PDF Converter - FastTools</title>

<meta name="description" content="Convert JPG images to PDF online for free using FastTools.">

<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:25px;
}

.preview-item{
background:#f8fafc;
border:1px solid #cbd5e1;
padding:10px;
border-radius:8px;
text-align:center;
}

.preview-item img{
max-width:100%;
border-radius:6px;
}

.preview-item input{
margin-top:8px;
}

.drop-area{
border:2px dashed #cbd5e1;
padding:40px;
border-radius:10px;
background:#f8fafc;
margin-top:20px;
cursor:pointer;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>JPG to PDF Converter</h1>

<p>Upload JPG images, preview them, select the ones you want, and download a PDF.</p>

<div class="drop-area" id="drop-area">

<p>Drag JPG images here or click to upload</p>

<input type="file" id="file-input" accept="image/jpeg" multiple hidden>

</div>

<div class="preview-grid" id="preview"></div>

<button class="main-button" onclick="createPDF()">Create PDF</button>

<a id="downloadLink"></a>

</div>


<div class="more-tools">

<h3>More Tools</h3>

<a href="png-to-jpg.html">PNG to JPG</a>
<a href="image-converter.html">Image Converter</a>
<a href="compress-image.html">Image Compressor</a>
<a href="word-counter.html">Word Counter</a>

</div>


<footer class="site-footer">

<p>
© 2026 FastTools • Free Online Tools
</p>

</footer>


<script>

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");

let images = [];

dropArea.onclick = () => fileInput.click();

dropArea.addEventListener("dragover", e=>{
e.preventDefault();
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener("change", ()=>{
handleFiles(fileInput.files);
});

function handleFiles(files){

for(let file of files){

if(file.type !== "image/jpeg") continue;

const reader = new FileReader();

reader.onload = function(e){

images.push(e.target.result);

const div = document.createElement("div");

div.className = "preview-item";

div.innerHTML = `
<img src="${e.target.result}">
<br>
<input type="checkbox" checked>
`;

preview.appendChild(div);

};

reader.readAsDataURL(file);

}

}


async function createPDF(){

const { PDFDocument } = PDFLib;

const pdfDoc = await PDFDocument.create();

const items = document.querySelectorAll(".preview-item");

for(let i=0;i<items.length;i++){

const checked = items[i].querySelector("input").checked;

if(!checked) continue;

const imgSrc = items[i].querySelector("img").src;

const imgBytes = await fetch(imgSrc).then(res=>res.arrayBuffer());

const jpg = await pdfDoc.embedJpg(imgBytes);

const page = pdfDoc.addPage([jpg.width, jpg.height]);

page.drawImage(jpg,{
x:0,
y:0,
width:jpg.width,
height:jpg.height
});

}

const pdfBytes = await pdfDoc.save();

const blob = new Blob([pdfBytes],{type:"application/pdf"});

const link = document.getElementById("downloadLink");

link.href = URL.createObjectURL(blob);

link.download = "images.pdf";

link.innerText = "Download PDF";

link.className = "main-button";

}

</script>

</body>
</html>
