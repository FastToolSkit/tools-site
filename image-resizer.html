<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Image Resizer & Crop - FastTools</title>

<meta name="description" content="Resize and crop images online with drag controls.">

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>

.editor-container{
max-width:800px;
margin:auto;
margin-top:20px;
}

#image{
max-width:100%;
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.controls button{
padding:10px 16px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.upload-box{
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Image Resizer & Crop</h1>

<p>Resize, crop, zoom and rotate images easily.</p>

<div class="upload-box">

<input type="file" id="upload" accept="image/*">

</div>

<div class="editor-container">

<img id="image">

</div>

<div class="controls">

<button onclick="cropper.rotate(-90)">Rotate Left</button>
<button onclick="cropper.rotate(90)">Rotate Right</button>

<button onclick="cropper.zoom(0.1)">Zoom In</button>
<button onclick="cropper.zoom(-0.1)">Zoom Out</button>

<button onclick="downloadImage()">Download</button>

</div>

</div>


<footer class="site-footer">

<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>

</footer>


<script>

let cropper;

document.getElementById("upload").addEventListener("change",function(){

const file = this.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

const image = document.getElementById("image");

image.src = e.target.result;

if(cropper){
cropper.destroy();
}

cropper = new Cropper(image,{
viewMode:1,
autoCropArea:1,
responsive:true
});

};

reader.readAsDataURL(file);

});


function downloadImage(){

const canvas = cropper.getCroppedCanvas();

const link = document.createElement("a");

link.download = "edited-image.png";

link.href = canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
