<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convertios - Free Online Conversion Tools</title>

<meta name="description" content="Convert files online for free. Fast, secure, no signup.">

<link rel="stylesheet" href="style.css?v=2">
<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="convertios-logo.png" style="height:50px;">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="search-box">
<span class="search-icon">🔍</span>
<input type="text" id="toolSearch" placeholder="Search tools..." onkeyup="searchTools()">
</div>

</header>

<!-- HERO -->
<div class="hero">

<h1>Free Online Conversion Tools & More</h1>
<p>Convert files instantly — No downloads. No signup.</p>

<div class="converter-card">

<label class="upload-area">
<input type="file" id="fileInput">
📁 Select File
</label>

<div class="format-row">

<select id="fromFormat">
<option value="">From</option>
<option value="pdf">PDF</option>
<option value="jpg">JPG</option>
<option value="png">PNG</option>
<option value="mp3">MP3</option>
<option value="wav">WAV</option>
</select>

<span style="color:white;">→</span>

<select id="toFormat">
<option value="">To</option>
</select>

<button id="convertBtn">Convert</button>

</div>

<div id="statusText"></div>

<!-- PROGRESS BAR -->
<div id="progressBar" style="display:none;height:6px;background:#0c2547;margin-top:10px;border-radius:6px;">
<div id="progressFill" style="height:100%;width:0%;background:#3a78ff;"></div>
</div>

<div id="downloadArea"></div>

</div>

</div>

<!-- TOOLS GRID (UNCHANGED) -->
<div class="tools-grid" id="tools">
<!-- keep your tools exactly as before -->
</div>

<footer class="site-footer">
© 2026 Convertios
</footer>

<script>

// ===== FORMAT LOGIC =====
const formatMap = {
pdf: ["docx","jpg","png"],
docx: ["pdf"],
jpg: ["png","webp","pdf"],
png: ["jpg","webp","pdf"],
mp3: ["wav"],
wav: ["mp3"]
};

// UPDATE DROPDOWN
document.getElementById("fromFormat").addEventListener("change", updateToOptions);

function updateToOptions(){
const from = document.getElementById("fromFormat").value;
const to = document.getElementById("toFormat");

to.innerHTML = '<option value="">To</option>';

if(!formatMap[from]) return;

formatMap[from].forEach(f=>{
const opt = document.createElement("option");
opt.value = f;
opt.textContent = f.toUpperCase();
to.appendChild(opt);
});
}

// AUTO DETECT FILE TYPE
document.getElementById("fileInput").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const ext = file.name.split(".").pop().toLowerCase();

if(formatMap[ext]){
document.getElementById("fromFormat").value = ext;
updateToOptions();
}

});

// PROGRESS
function setProgress(p){
document.getElementById("progressBar").style.display = "block";
document.getElementById("progressFill").style.width = p + "%";
}

// ===== CONVERT =====
document.getElementById("convertBtn").addEventListener("click", convertFile);

async function convertFile(){

const file = document.getElementById("fileInput").files[0];
const toFormat = document.getElementById("toFormat").value;

if(!file){
alert("Select file");
return;
}

if(!toFormat){
alert("Select output format");
return;
}

const btn = document.getElementById("convertBtn");
btn.disabled = true;

document.getElementById("downloadArea").innerHTML = "";
document.getElementById("statusText").innerText = "Uploading...";
setProgress(10);

const apiKey = "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJhdWQiOiIxIiwianRpIjoiMTczYWIxNDhmMDUzMmUyYmI4Yzg0N2IxODE3MTczMjUxN2YzYzRkNmI0OTRiNGFkZTg3NjM3NmEzZDE0NjZkYjZiMWNlMjk2ODIwYzg3YzMiLCJpYXQiOjE3NzQ0MTkzNzkuNDU4MjY0LCJuYmYiOjE3NzQ0MTkzNzkuNDU4MjY1LCJleHAiOjQ5MzAwOTI5NzkuNDUyNjM2LCJzdWIiOiI3NDYzODE2MSIsInNjb3BlcyI6WyJ0YXNrLnJlYWQiLCJ0YXNrLndyaXRlIl19.rAA6MNrIEd7T2hSZi8Cy4uUO00JiENXwE-0Acss0uwGJaicbcVfLkHH5NDI5NfVPcTEiKsblHsSzz067q_lwD5utri48y2NvyeuoKowXATIAPyCSt3tQKqJo0MgSa9dmTkNGrMvkWGAkl-DdKLikbefeoaEha_U43J7_CwnhBiY3YvGZwHD4XGRMRc2-Vl_qeZFnvrVrfFE3vHdM38rqwS-BwUrGOHER2GofmpfEJaOqnoDLlX8YWRV03_RzYTj5mKGsRvupGYegnXdCiu_ZQV-QQDeTqBP3DRs3coZYOYTkGdOmjQ-Wffk6QL8Ub3JVKibfX4JIUpHkB81bxKdoFIsaOhaPU9mPeWc1jhdlm6_4UgTlhaWyuIHQhXohKZEP1vT2UCHWFUm3nKbG4fiLys3W48qvbL-yBhZp84pkxy69ZBnRkoY9vrIVbkWvKeaqXcBaqqdNcVg3d57RmI1jvnwqd3zx9I7jTE4uk-q_jmaJi7K6Ei25IlXubaSuXVS41jjiUKK4FtTYPhfOuBSKUShwfY3tsdivQrVYg7eTF7bTjAyflKALoTUmoSeohRxvHY6zqlTWkb102s2qyDqVUlXuyqKIGvnY7ZkZp2H-Oem0XrqDvANLxE8pVDOdTgcGqfmbQh-DFcfGuZL_kBwFoe0R8vUdqMdv9EvkEuQTnTk
";

try{

const job = await fetch("https://api.cloudconvert.com/v2/jobs",{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({
tasks:{
"upload-file":{operation:"import/upload"},
"convert-file":{
operation:"convert",
input:"upload-file",
output_format:toFormat
},
"export-file":{
operation:"export/url",
input:"convert-file"
}
}
})
});

const data = await job.json();

if(!data.data){
throw new Error("CloudConvert failed: " + JSON.stringify(data));
}setProgress(30);

// UPLOAD
const uploadTask = data.data.tasks.find(t=>t.name==="upload-file");

const formData = new FormData();

Object.entries(uploadTask.result.form.parameters).forEach(([k,v])=>{
formData.append(k,v);
});

formData.append("file",file);

await fetch(uploadTask.result.form.url,{
method:"POST",
body:formData
});

setProgress(60);
document.getElementById("statusText").innerText = "Processing...";

let url = null;

while(!url){
await new Promise(r=>setTimeout(r,2000));

const check = await fetch(`https://api.cloudconvert.com/v2/jobs/${data.data.id}`,{
headers:{"Authorization":"Bearer "+apiKey}
});

const result = await check.json();

const exportTask = result.data.tasks.find(t=>t.name==="export-file");

if(exportTask && exportTask.status==="finished"){
url = exportTask.result.files[0].url;
}

setProgress(85);
}

setProgress(100);

document.getElementById("statusText").innerText = "Done ✅";

document.getElementById("downloadArea").innerHTML = `
<a href="${url}" target="_blank" class="convert-btn">⬇ Download File</a>
`;

btn.disabled = false;

}catch(e){
console.error(e);
document.getElementById("statusText").innerText = "Error converting file";
btn.disabled = false;
}

}

// SEARCH
function searchTools(){
let input = document.getElementById("toolSearch").value.toLowerCase();
let cards = document.querySelectorAll(".tool-card");

cards.forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
});
}

</script>

</body>
</html>
