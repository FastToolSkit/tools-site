<!DOCTYPE html>
<html>
<head>

<title>WEBP to PNG Converter - FastTools</title>

</head>

<body>

<h1>WEBP to PNG Converter</h1>

<p>Upload WEBP images and convert them to PNG.</p>

<!-- UPLOAD INPUT -->
<input type="file" id="upload" multiple>

<br><br>

<!-- CONVERT BUTTON -->
<button onclick="convert()">Convert</button>

<br><br>

<!-- DOWNLOAD LINKS WILL APPEAR HERE -->
<div id="downloads"></div>

<script>

function convert(){

let files = document.getElementById("upload").files;

for(let i=0;i<files.length;i++){

let file = files[i];

let img = new Image();
let reader = new FileReader();

reader.onload=function(e){

img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");

canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0);

let png=canvas.toDataURL("image/png");

let link=document.createElement("a");

link.href=png;
link.download="converted_"+i+".png";
link.innerHTML="Download Image "+(i+1);

document.getElementById("downloads").appendChild(link);
document.getElementById("downloads").appendChild(document.createElement("br"));

}

}

reader.readAsDataURL(file);

}

}

</script>

</body>
</html>
